<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusList</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>FocusList</h1>

    <div class="topBar">
        <p id="counter">Počet úkolů: 0</p>
        <button id="darkModeToggle">Dark mode</button>
    </div>

    <div class="container">
        <input 
            type="text" 
            id="taskInput" 
            placeholder="Zadej úkol..."
        >

        <button id="addTaskBtn">
            Přidat
        </button>
    </div>

    <ul id="taskList"></ul>

    <script src="script.js"></script>

</body>
</html>
